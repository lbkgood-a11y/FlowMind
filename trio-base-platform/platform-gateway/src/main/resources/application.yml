server:
  port: 8080

spring:
  application:
    name: platform-gateway
  config:
    import: optional:nacos:${spring.application.name}.yml
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
        file-extension: yml
    gateway:
      routes:
        - id: service-auth
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/auth,/api/v1/auth/**
        - id: service-org
          uri: ${ORG_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/v1/org,/api/v1/org/**
        - id: service-tenant
          uri: ${TENANT_SERVICE_URL:http://localhost:8083}
          predicates:
            - Path=/api/v1/tenants,/api/v1/tenants/**
        - id: service-lowcode
          uri: ${LOWCODE_SERVICE_URL:http://localhost:8085}
          predicates:
            - Path=/api/v1/forms,/api/v1/forms/**,/api/v1/form-instances,/api/v1/form-instances/**,/api/v1/lowcode-applications,/api/v1/lowcode-applications/**,/api/v1/lowcode-runtime,/api/v1/lowcode-runtime/**
        - id: service-workflow-engine
          uri: ${WF_SERVICE_URL:http://localhost:8086}
          predicates:
            - Path=/api/v1/process-packages,/api/v1/process-packages/**,/api/v1/process-instances,/api/v1/process-instances/**,/api/v1/process-business-objects,/api/v1/process-business-objects/**,/api/v1/tasks,/api/v1/tasks/**
        - id: service-action
          uri: ${ACTION_SERVICE_URL:http://localhost:8089}
          predicates:
            - Path=/api/v1/actions,/api/v1/actions/**
        - id: data-analytics
          uri: ${DATA_ANALYTICS_URL:http://localhost:8091}
          predicates:
            - Path=/api/v1/data,/api/v1/data/**
        - id: ai-llm-gateway
          uri: ${ai.services.llm-gateway.url}
          predicates:
            - Path=/api/v1/ai,/api/v1/ai/**,/api/v1/llm,/api/v1/llm/**
          metadata:
            connect-timeout: 30000
            response-timeout: 120s
        - id: ai-rag-service
          uri: ${ai.services.rag-service.url}
          predicates:
            - Path=/api/v1/rag,/api/v1/rag/**
          metadata:
            connect-timeout: 30000
            response-timeout: 120s
        - id: ai-agent-orchestrator
          uri: ${ai.services.agent-orchestrator.url}
          predicates:
            - Path=/api/v1/agent,/api/v1/agent/**
          metadata:
            connect-timeout: 30000
            response-timeout: 300s
        - id: service-auth-users
          uri: ${AUTH_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/v1/users,/api/v1/users/**,/api/v1/roles,/api/v1/roles/**,/api/v1/menus,/api/v1/menus/**,/api/v1/menu,/api/v1/menu/**,/api/v1/authz,/api/v1/authz/**,/api/v1/data-policies,/api/v1/data-policies/**,/api/v1/audit-logs,/api/v1/audit-logs/**,/api/v1/sessions,/api/v1/sessions/**,/api/v1/dictionaries,/api/v1/dictionaries/**,/api/v1/system-configs,/api/v1/system-configs/**
        - id: service-ops
          uri: ${OPS_SERVICE_URL:http://localhost:8087}
          predicates:
            - Path=/api/v1/announcements,/api/v1/announcements/**,/api/v1/messages,/api/v1/messages/**,/api/v1/files,/api/v1/files/**,/api/v1/file-references,/api/v1/file-references/**,/api/v1/import-export-tasks,/api/v1/import-export-tasks/**,/api/v1/jobs,/api/v1/jobs/**
        - id: service-openapi-management
          uri: ${OPENAPI_SERVICE_URL:http://localhost:8088}
          predicates:
            - Path=/api/v1/openapi/management,/api/v1/openapi/management/**
      httpclient:
        response-timeout: 120s
        connect-timeout: 5000

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

auth:
  service:
    url: ${AUTH_SERVICE_URL:http://localhost:8081}
  whitelist-paths: /api/v1/auth/**,/api/v1/openapi/runtime/**,/api/v1/openapi/callbacks/**,/health,/actuator/**

tenant:
  service:
    url: ${TENANT_SERVICE_URL:http://localhost:8083}
  validation:
    enabled: ${TENANT_VALIDATION_ENABLED:true}

triobase:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:triobase-local-internal-token}
  openapi:
    service-url: ${OPENAPI_SERVICE_URL:http://localhost:8088}
    gateway-auth-secret: ${OPENAPI_GATEWAY_AUTH_SECRET:}
    runtime:
      enabled: ${OPENAPI_RUNTIME_ROUTE_ENABLED:false}

ai:
  services:
    # Phase 3: 先默认直连本地 Python 服务，后续接入 Nacos 后可改成 lb://ai-llm-gateway
    llm-gateway:
      url: ${AI_LLM_GATEWAY_URL:http://localhost:8002}
    # Phase 3: 先默认直连独立 RAG 服务，后续接入 Nacos 后可改成 lb://ai-rag-service
    rag-service:
      url: ${AI_RAG_SERVICE_URL:http://localhost:8003}
    agent-orchestrator:
      url: ${AI_AGENT_ORCHESTRATOR_URL:http://localhost:8004}

logging:
  level:
    root: DEBUG
    com.triobase: DEBUG
