server:
  port: 8087

spring:
  application:
    name: service-ops
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${OPS_DB_URL:jdbc:postgresql://localhost:5433/triobase}
    username: ${OPS_DB_USERNAME:triobase}
    password: ${OPS_DB_PASSWORD:triobase123}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    table: flyway_schema_history_ops
    baseline-on-migrate: true
    baseline-version: 0
  servlet:
    multipart:
      max-file-size: ${OPS_STORAGE_MAX_FILE_SIZE:50MB}
      max-request-size: ${OPS_STORAGE_MAX_REQUEST_SIZE:60MB}
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
        file-extension: yml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

ops:
  storage:
    base-path: ${OPS_STORAGE_BASE_PATH:${user.home}/.triobase/files}
    allowed-extensions: ${OPS_STORAGE_ALLOWED_EXTENSIONS:txt,csv,xlsx,xls,pdf,png,jpg,jpeg,doc,docx,json,zip}
    max-file-size-bytes: ${OPS_STORAGE_MAX_FILE_SIZE_BYTES:52428800}

logging:
  level:
    root: DEBUG
    com.triobase: DEBUG
