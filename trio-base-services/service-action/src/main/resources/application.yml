server:
  port: ${ACTION_SERVICE_PORT:8089}

spring:
  application:
    name: service-action
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${ACTION_DB_URL:jdbc:postgresql://localhost:5433/triobase}
    username: ${ACTION_DB_USERNAME:triobase}
    password: ${ACTION_DB_PASSWORD:triobase123}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    table: flyway_schema_history_action
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
        file-extension: yml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

triobase:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:triobase-local-internal-token}
    allowed-callers: ${INTERNAL_ALLOWED_CALLERS:service-lowcode,service-workflow-engine,service-openapi,service-auth,platform-gateway}
  integrations:
    auth:
      base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
  action:
    owner:
      base-urls:
        service-lowcode: ${LOWCODE_SERVICE_URL:http://localhost:8085}
        service-workflow-engine: ${WF_SERVICE_URL:http://localhost:8086}
        service-openapi: ${OPENAPI_SERVICE_URL:http://localhost:8088}

logging:
  level:
    root: DEBUG
    com.triobase: DEBUG
