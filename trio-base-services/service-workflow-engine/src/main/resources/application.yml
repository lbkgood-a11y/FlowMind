server:
  port: 8086

spring:
  application:
    name: service-workflow-engine
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${WF_DB_URL:jdbc:postgresql://localhost:5433/triobase}
    username: ${WF_DB_USERNAME:triobase}
    password: ${WF_DB_PASSWORD:triobase123}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
  # Temporal Worker — 铁律 5：Task Queue 与 spring.application.name 强绑定
  temporal:
    namespace: default
    connection:
      target: ${TEMPORAL_TARGET:127.0.0.1:7233}
    workers-auto-discovery:
      packages:
        - com.triobase.service.workflow

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

workflow:
  services:
    auth-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    org-url: ${ORG_SERVICE_URL:http://localhost:8082}
    lowcode-url: ${LOWCODE_SERVICE_URL:http://localhost:8085}
  internal:
    service-name: ${spring.application.name}
    token: ${INTERNAL_SERVICE_TOKEN:triobase-local-internal-token}
  participants:
    connect-timeout: ${WORKFLOW_PARTICIPANT_CONNECT_TIMEOUT:200ms}
    read-timeout: ${WORKFLOW_PARTICIPANT_READ_TIMEOUT:400ms}
    max-candidates: ${WORKFLOW_PARTICIPANT_MAX_CANDIDATES:200}

triobase:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:triobase-local-internal-token}
    allowed-callers: ${INTERNAL_ALLOWED_CALLERS:service-lowcode}

logging:
  level:
    root: INFO
    com.triobase: DEBUG
    io.temporal: DEBUG
    io.temporal.spring.boot: TRACE
