server:
  port: 8086

spring:
  application:
    name: service-workflow-engine
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${WF_DB_URL:jdbc:postgresql://localhost:5433/triobase}
    username: ${WF_DB_USERNAME:triobase}
    password: ${WF_DB_PASSWORD:triobase123}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# Temporal Worker — 铁律 5：Task Queue 与 spring.application.name 强绑定
temporal:
  enabled: true
  namespace: default
  task-queue: ${spring.application.name}
  workers:
    - task-queue: ${spring.application.name}
      capacity:
        max-concurrent-activity-execution-size: 20
        max-concurrent-workflow-execution-size: 10

logging:
  level:
    root: DEBUG
    com.triobase: DEBUG
