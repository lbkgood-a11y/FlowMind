server:
  port: 8082

spring:
  application:
    name: service-org
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${ORG_DB_URL:jdbc:postgresql://localhost:5433/triobase}
    username: ${ORG_DB_USERNAME:triobase}
    password: ${ORG_DB_PASSWORD:triobase123}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
    table: flyway_schema_history_org
    baseline-on-migrate: true
    baseline-version: 0
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
        file-extension: yml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

triobase:
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:triobase-local-internal-token}
    allowed-callers: ${INTERNAL_ALLOWED_CALLERS:service-workflow-engine}

logging:
  level:
    root: DEBUG
    com.triobase: DEBUG
