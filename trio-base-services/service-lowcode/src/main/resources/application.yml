server:
  port: 8085

spring:
  application:
    name: service-lowcode
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${LOWCODE_DB_URL:jdbc:postgresql://localhost:5433/triobase}
    username: ${LOWCODE_DB_USERNAME:triobase}
    password: ${LOWCODE_DB_PASSWORD:triobase123}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: ${LOWCODE_FLYWAY_ENABLED:true}
    locations: classpath:db/migration
    table: flyway_schema_history_lowcode
    baseline-on-migrate: true
    baseline-version: 0
    validate-on-migrate: false
  cloud:
    nacos:
      discovery:
        server-addr: localhost:8848
      config:
        server-addr: localhost:8848
        file-extension: yml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

triobase:
  integrations:
    action:
      base-url: ${ACTION_SERVICE_URL:http://localhost:8089}
    auth:
      base-url: ${AUTH_SERVICE_URL:http://localhost:8081}
    workflow:
      base-url: ${WORKFLOW_SERVICE_URL:http://localhost:8086}
  internal:
    token: ${INTERNAL_SERVICE_TOKEN:triobase-local-internal-token}
    allowed-callers: ${INTERNAL_ALLOWED_CALLERS:service-workflow-engine}

logging:
  level:
    root: DEBUG
    com.triobase: DEBUG
