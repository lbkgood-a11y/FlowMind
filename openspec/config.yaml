schema: spec-driven

context: |
  ## TrioBase — AI-native 企业智能化底座

  定位：AI-native 架构的企业智能化底座，解决"业务与智能割裂、难以快速集成"的痛点。
  核心特点：快速构建、无缝集成。
  交互模式：GUI（确定性表单/流程）+ LUI（自然语言/智能体对话）双模驱动。

  ### 三大核心板块
  - 业务流程快速构建：低代码/工作流/领域核心(用户、权限、计费) — Java(Spring Cloud)
  - 数据驱动价值：ETL、知识萃取与向量化、实时/离线分析 — ClickHouse/Doris、向量库、图数据库
  - AI 赋能业务：意图路由、多Agent编排、LLM 抽象网关 — Python(LangGraph/AutoGen)

  ### 技术栈
  - 后端核心：Java 21 + Spring Boot 3.4.3 + Spring Cloud 2024.0.1 + Temporal 1.28.1
  - 注册/配置中心：Nacos（Spring Cloud Alibaba）
  - 消息总线：Apache Kafka
  - 构建工具：Maven（BOM 依赖管理）
  - AI 层：Python >=3.12 + Poetry + FastAPI + LangGraph + LiteLLM + Temporal Python SDK
  - 前端：React 19 + Next.js 15 + Vercel AI SDK + Zustand + TanStack Query + Shadcn UI
  - 存储：PostgreSQL + pgvector + Neo4j + ClickHouse
  - CI/CD：Harness Pipeline + SonarQube + Checkstyle
  - 仓库策略：Monorepo（后续按需拆分独立仓库）

  ### 核心架构约束
  - 双引擎：Spring Cloud 治外（微服务通信/网关/配置），Temporal 治内（流程编排/重试/最终一致性）
  - 双网关：Spring Cloud Gateway（流量治理+第一道脱敏），Python LLM Gateway（模型治理+第二道脱敏）
  - Temporal Worker 必须嵌入 Spring Boot 微服务，Task Queue 与 spring.application.name 强绑定
  - 跨语言（Java↔Python）Temporal 协同时参数序列化为标准 JSON 或 Protobuf

  ### 十一条铁律（CI 门禁强制执行，违反直接 Block）
  1. 严禁长链路同步 Feign 调用（>500ms 或状态变更必须转 Temporal Workflow）
  2. AI 网关脱敏强制：所有 LLM 请求必须经 API 网关 + LLM 网关双重校验
  3. Workflow 代码绝对确定性（禁止 System.currentTimeMillis/UUID.randomUUID 等时变调用）
  4. Workflow 内部严禁 I/O（所有 I/O 封装在 Activity 中）
  5. Worker 与微服务生命周期共生死（禁止孤立通用 Worker 集群）
  6. 多语言 Agent 契约标准化（JSON/Protobuf，禁止语言特有序列化）
  7. Activity 必须幂等（唯一索引/分布式锁/状态机前置校验）
  8. TraceId 链路全贯通（X-B3-TraceId 通过 Temporal Header 透传至所有下游）
  9. 流式渲染标准：LLM 输出必须 SSE 流式，禁止阻塞等全部结果再返回 JSON
  10. Generative UI 安全沙箱：动态组件必须在 Component Registry 注册 + Zod Schema 校验，禁止 eval()
  11. LUI→GUI 单向数据流：LUI 通过 Action→Zustand Store→GUI 重渲染，禁止直接 DOM 操作

  ### 工程结构约定
  - trio-base-common/：通用基础层（所有 Java 微服务强制依赖）
    - common-core/：基础工具、异常枚举、Result 响应体、TraceId
    - common-dto/：跨服务共享 DTO/事件载荷
    - common-temporal/：Temporal 公共抽象（BaseActivity、ContextPropagationInterceptor、RetryPolicy）
    - common-archunit/：铁律检查规则包（所有服务 test scope 引用）
  - trio-base-platform/：基础设施层（gateway、registry）
  - trio-base-services/：业务微服务层（auth/org/tenant/billing/lowcode/workflow-engine）
  - trio-base-data/：数据层（pipeline/embedding/analytics）
  - trio-base-ai/：AI 层 Python 独立项目（intent-router/agent-orchestrator/llm-gateway）
  - trio-base-frontend/：前端工程 — Next.js 15 单项目（React 19 + TypeScript 5.7）
    - package.json：next 15、react 19、zustand 5、@tanstack/react-query 5、ai 4（Vercel AI SDK）、zod 3
    - tsconfig.json / next.config.ts：TypeScript 5.7 + bundler 模块解析 + 路径别名
    - .eslintrc.json：no-eval / no-new-func / react/no-danger（铁律 10 前端防线）
    - src/app/layout.tsx：根布局（App Router）
    - src/app/page.tsx：双模主页面（GUI 业务区 + LUI AI 助手侧栏）
    - src/components/Shell.tsx：QueryClientProvider 包裹器（TanStack Query Server State 缓存层）
    - src/components/ChatPanel.tsx：LUI 智能助手面板（useChat SSE 流式渲染，铁律 9）
    - src/stores/app-store.ts：Zustand 全局状态（mode: gui/lui + pendingAction，铁律 11 LUI→GUI 单向流）
    - src/registry/component-registry.ts：Generative UI 组件注册表 + Zod Schema 校验沙箱（铁律 10）
    - src/lib/utils.ts：cn() 工具函数（clsx + tailwind-merge）
  - 包名统一前缀：com.triobase（Java）、triobase_（Python）、@triobase/（前端 npm scope 预留）

  ### 开发路线
  1. 核心先行：业务流程基础服务 + LLM 网关 + 基础 RAG
  2. 数据补齐：数据管道接入、向量与结构化混合查询
  3. 全面智能体化：Multi-Agent Flow 全面接管业务工作流

rules:
  proposal:
    - 提案必须说明影响范围（哪些模块/服务会变动）以及是否涉及铁律合规
    - 涉及跨服务调用变更的提案，必须注明走 Feign 还是 Temporal，并说明理由
    - 涉及 AI/Prompt 处理的变更，必须说明脱敏策略
    - 涉及前端 Generative UI 的变更，必须列出新增的动态组件及 Zod Schema
  tasks:
    - 任务按模块分组（common/platform/services/data/ai/frontend），标注并行或串行依赖
    - 每个任务需关联对应的铁律检查项（如涉及）
  design:
    - 架构决策需注明是否影响双网关、双引擎或跨语言契约
    - 新增服务的 Worker 配置需明确 Task Queue 命名
  specs:
    - API 契约变更需同步标注 OpenAPI/Protobuf 更新
    - 数据模型变更需考虑 PostgreSQL + 向量库 + 图数据库的影响
