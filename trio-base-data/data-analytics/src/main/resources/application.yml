server:
  port: 8091

spring:
  application:
    name: data-analytics
  config:
    import: optional:nacos:${spring.application.name}.yml
  datasource:
    url: ${DATA_ANALYTICS_DB_URL:jdbc:postgresql://localhost:5433/triobase}
    username: ${DATA_ANALYTICS_DB_USERNAME:triobase}
    password: ${DATA_ANALYTICS_DB_PASSWORD:triobase123}
    driver-class-name: org.postgresql.Driver
    type: com.alibaba.druid.pool.DruidDataSource
  flyway:
    enabled: true
    locations: classpath:db/migration
    validate-on-migrate: false
  cloud:
    nacos:
      discovery:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
      config:
        enabled: ${NACOS_ENABLED:false}
        server-addr: localhost:8848
        file-extension: yml

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

data:
  query:
    max-page-size: 100
    max-top-k: 20
    similarity-threshold: 0.05
  embedding:
    dimension: 32
  chunking:
    max-chars: 500
    overlap-chars: 50

logging:
  level:
    root: INFO
    com.triobase: DEBUG
