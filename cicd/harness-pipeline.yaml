# TrioBase CI quality gate. Build/runtime baseline: Java 21 and Node 22.18+.
pipeline:
  name: TrioBase CI Gate
  identifier: triobase_ci_gate
  stages:
    - stage:
        name: Quality Gate
        identifier: quality_gate
        type: CI
        spec:
          execution:
            steps:
              - step:
                  name: Compile and unit/integration tests
                  type: Run
                  spec:
                    command: mvn -B -ntp -pl trio-base-platform/platform-gateway,trio-base-services/service-openapi -am verify
                    reports:
                      - type: JUnit
                        paths: ["**/target/surefire-reports/*.xml"]
              - step:
                  name: OpenAPI architecture migration and contract gates
                  type: Run
                  spec:
                    command: bash cicd/scripts/verify-openapi-contract.sh
              - step:
                  name: OpenAPI delivery acceptance
                  type: Run
                  spec:
                    command: bash cicd/scripts/verify-openapi-acceptance.sh
              - step:
                  name: JaCoCo report and SonarQube gate
                  type: Run
                  spec:
                    command: mvn jacoco:report sonar:sonar -Dsonar.projectKey=triobase -Dsonar.host.url=${SONAR_HOST_URL} -Dsonar.token=${SONAR_TOKEN}
              - step:
                  name: Dependency and secret security scan
                  type: Run
                  spec:
                    command: trivy fs --exit-code 1 --severity HIGH,CRITICAL --scanners vuln,secret --skip-dirs trio-base-frontend/node_modules .
              - step:
                  name: Frontend lint type check and build
                  type: Run
                  spec:
                    command: cd trio-base-frontend && pnpm lint && pnpm typecheck && pnpm build
              - step:
                  name: AI Agent architecture safety and evaluation gates
                  type: Run
                  spec:
                    command: cd trio-base-ai/ai-agent-orchestrator && pip install poetry==2.4.1 && poetry install --no-interaction && poetry run ruff check src tests && poetry run pytest --junitxml=agent-test-results.xml
                    reports:
                      - type: JUnit
                        paths: ["trio-base-ai/ai-agent-orchestrator/agent-test-results.xml"]
              - step:
                  name: AI gateways redaction retrieval and isolation gates
                  type: Run
                  spec:
                    command: for service in ai-llm-gateway ai-rag-service; do cd trio-base-ai/$service && poetry install --no-interaction && poetry run ruff check src tests && poetry run pytest --junitxml=test-results.xml && cd ../..; done
                    reports:
                      - type: JUnit
                        paths: ["trio-base-ai/*/test-results.xml"]
              - step:
                  name: Agent LUI streaming and component registry gates
                  type: Run
                  spec:
                    command: cd trio-base-frontend && pnpm vitest run apps/web-antd/src/api/agent.test.ts apps/web-antd/src/registry/agent-component-registry.test.ts apps/web-antd/src/store/agent.test.ts apps/web-antd/src/shared/action/useRefreshScopes.test.ts
        failure:
          - type: Pipeline
            action: Block
            message: "Quality gate failed; public OpenAPI routes remain disabled."
